{% extends 'base.html' %}
{% block title%}{{ post.title }}{% endblock %}
{% block content%}
<section class="news-block">
            <div class="container-fluid">
                <div class="news-block_content">

                    <h3 class="mb-10">{{ post.title }}</h3>
                    <p class="mb-15">{{ post.created_at}}</p>
                    <img src="{{ post.image_URL }}" alt="" class="rounded-full-image">
                    <p class="mb-15">{{ post.description }}</p>
                    <a href="#">#{{ post.category }}</a>
                </div>
                <div class="news-block_adv">
                    <h3>Advertising</h3>
                    <div class="news-adv_card">
                        {% for adv in advs %}
                        <img src="{{ adv.image_url }}" alt="{{ adv.name }}" class="news-adv_img">
                        {% endfor %}
                    </div>
                </div>
            </div>


        </section>
{% endblock %}

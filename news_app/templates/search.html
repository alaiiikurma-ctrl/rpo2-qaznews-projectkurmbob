{% extends 'base.html' %}

{% block title %}Search{% endblock %}

{% block content %}
<section class="news-block">
            <div class="container-fluid">
                <div class="news-block_content">
                    <h3>Search</h3>
                    <form action="{% url 'search_results' %}" method="get">
                        <label for="search">Enter news title </label>
                        <input id="search" name="q" type="text" placeholder="Enter news title" required>
                        <button type="submit">Search</button>
                    </form>

                </div>
                <div class="news-block_adv">
                    <h3>Advertising</h3>
                    <div class="news-adv_card">
                        {% for adv in advs %}
                        <img src="{{ adv.image_url }}" alt="{{ adv.name }}" class="news-adv_img">
                        {% endfor %}
                    </div>
                </div>
            </div>


        </section>
{% endblock%}
